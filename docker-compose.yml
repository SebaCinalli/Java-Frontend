services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules # Evita pisar los módulos del contenedor con los locales
    environment:
      # Esta variable es clave para que Vite detecte los cambios en los archivos
      # si estás cruzando sistemas de archivos
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://host.docker.internal:8080